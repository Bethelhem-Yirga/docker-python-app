<!DOCTYPE html>
<html>
<head>
    <title>Docker Network Demo</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button { background: #0070f3; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0051b3; }
        #result { margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌐 Docker Network Demo</h1>
        <p>Frontend is talking to backend via <strong>container name</strong></p>
        <button onclick="callBackend()">Call Backend API</button>
        <div id="result">Click the button...</div>
    </div>

    <script>
        async function callBackend() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Loading...';
            
            try {
                // ⭐ NOTICE: We use the container name "backend" as the hostname!
                const response = await fetch('http://backend:5000/api/hello');
                const data = await response.json();
                resultDiv.innerHTML = `<strong>✅ Response:</strong> ${data.message}`;
            } catch (error) {
                resultDiv.innerHTML = `<strong>❌ Error:</strong> ${error.message}`;
            }
        }
    </script>
</body>
</html>
